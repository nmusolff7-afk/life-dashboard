<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Apex Fitness — Sign In</title>
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #5c6bc0;
      --accent2: #7986cb;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --danger:  #f85149;
      --green:   #3fb950;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
    }
    .page {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 2rem; gap: 0.5rem;
    }
    .logo-img { height: 56px; width: auto; }
    .logo {
      font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
      font-size: 2.4rem; font-weight: 400; letter-spacing: 0.18em;
      color: var(--text); line-height: 1;
    }
    .logo-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem; font-weight: 500; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .card {
      width: 100%; max-width: 360px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.75rem 1.5rem;
    }
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem; gap: 0;
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      font-size: 0.88rem; font-weight: 600; padding: 0.6rem 0;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #0d1117; border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.95rem;
      padding: 0.65rem 0.9rem; outline: none; transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: none;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff; transition: background .15s;
      margin-top: 0.25rem;
    }
    .btn:hover { background: var(--accent2); }
    .error {
      background: rgba(248,81,73,.1); border: 1px solid var(--danger);
      color: var(--danger); border-radius: 8px; padding: 0.6rem 0.85rem;
      font-size: 0.84rem; margin-bottom: 1rem;
    }
    .hint {
      font-size: 0.78rem; color: var(--muted); text-align: center;
      margin-top: 1.25rem; line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="logo-wrap">
    <img src="/static/apex-logo.png" alt="Apex Fitness" class="logo-img">
    <div class="logo">APEX</div>
    <div class="logo-sub">Life Dashboard</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login-btn">Sign In</button>
      <button class="tab-btn" id="tab-register-btn">Create Account</button>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Login form -->
    <form method="post" class="form-panel active" id="panel-login">
      <input type="hidden" name="action" value="login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username"
          autocorrect="off" autocapitalize="none" spellcheck="false"
          placeholder="your username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password"
          placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <!-- Register form -->
    <form method="post" class="form-panel" id="panel-register">
      <input type="hidden" name="action" value="register">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username"
          autocorrect="off" autocapitalize="none" spellcheck="false"
          placeholder="choose a username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password"
          placeholder="at least 4 characters" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="hint">Your data is stored privately and never shared.</div>
  </div>
</div>

<script>
  const loginBtn    = document.getElementById("tab-login-btn");
  const registerBtn = document.getElementById("tab-register-btn");
  const loginPanel  = document.getElementById("panel-login");
  const regPanel    = document.getElementById("panel-register");

  loginBtn.addEventListener("click", () => {
    loginBtn.classList.add("active");    registerBtn.classList.remove("active");
    loginPanel.classList.add("active");  regPanel.classList.remove("active");
  });
  registerBtn.addEventListener("click", () => {
    registerBtn.classList.add("active"); loginBtn.classList.remove("active");
    regPanel.classList.add("active");    loginPanel.classList.remove("active");
  });

  // If the error was on register, show that tab
  {% if error and request.form.get('action') == 'register' %}
  registerBtn.click();
  {% endif %}
</script>
</body>
</html>
