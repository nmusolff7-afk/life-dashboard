<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Apex Fitness — Sign In</title>
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0A0A0F;
      --surface: #13131A;
      --surface2: #1C1C26;
      --border:  rgba(255,255,255,0.03);
      --accent:  #6C6FFF;
      --accent2: #8285FF;
      --text:    #FFFFFF;
      --muted:   #8888A0;
      --danger:  #FF4D4D;
      --green:   #34D87A;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 15px; -webkit-font-smoothing: antialiased;
    }
    .page {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 2rem; gap: 0.5rem;
    }
    .logo-img { height: 56px; width: auto; }
    .logo {
      font-family: 'Bebas Neue', 'Rajdhani', sans-serif;
      font-size: 2.4rem; font-weight: 400; letter-spacing: 0.18em;
      color: var(--text); line-height: 1;
    }
    .logo-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem; font-weight: 500; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .card {
      width: 100%; max-width: 360px;
      background: var(--surface); border: none;
      border-radius: 20px; padding: 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }
    .tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.04);
      margin-bottom: 1.5rem; gap: 0;
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      font-size: 0.88rem; font-weight: 600; padding: 0.6rem 0;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; color: var(--text); font-size: 15px;
      padding: 14px 16px; outline: none; transition: border-color 180ms ease;
      -webkit-appearance: none;
    }
    input::placeholder { color: #555570; }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; height: 52px; border-radius: 14px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: var(--accent); color: #fff;
      transition: background 180ms ease, transform 100ms ease;
      margin-top: 0.25rem; box-shadow: 0 4px 16px rgba(108,111,255,0.35);
    }
    .btn:hover { background: var(--accent2); }
    .btn:active { transform: scale(0.97); }
    .error {
      background: rgba(255,77,77,.08); border: none;
      color: var(--danger); border-radius: 14px; padding: 14px 16px;
      font-size: 14px; margin-bottom: 1rem;
    }
    .hint {
      font-size: 0.78rem; color: var(--muted); text-align: center;
      margin-top: 1.25rem; line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="logo-wrap">
    <img src="/static/apex-logo.png" alt="Apex Fitness" class="logo-img">
    <div class="logo">APEX</div>
    <div class="logo-sub">Life Dashboard</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login-btn">Sign In</button>
      <button class="tab-btn" id="tab-register-btn">Create Account</button>
      <button class="tab-btn" id="tab-reset-btn">Reset</button>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Login form -->
    <form method="post" class="form-panel active" id="panel-login">
      <input type="hidden" name="action" value="login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username"
          autocorrect="off" autocapitalize="none" spellcheck="false"
          placeholder="your username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password"
          placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <!-- Register form -->
    <form method="post" class="form-panel" id="panel-register">
      <input type="hidden" name="action" value="register">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username"
          autocorrect="off" autocapitalize="none" spellcheck="false"
          placeholder="choose a username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password"
          placeholder="at least 4 characters" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>

    <!-- Reset password form -->
    <div class="form-panel" id="panel-reset">
      <div id="reset-step-1">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reset-username" autocomplete="username"
            autocorrect="off" autocapitalize="none" spellcheck="false"
            placeholder="your username">
        </div>
        <button type="button" class="btn" id="reset-check-btn">Next</button>
      </div>
      <div id="reset-step-2" style="display:none">
        <div style="font-size:0.84rem;color:var(--green);margin-bottom:1rem">Account found. Enter your recovery key and a new password.</div>
        <div class="field">
          <label>Recovery key</label>
          <input type="password" id="reset-recovery-key" autocomplete="off"
            placeholder="set via RECOVERY_KEY env var">
        </div>
        <div class="field">
          <label>New password</label>
          <input type="password" id="reset-new-pw" autocomplete="new-password"
            placeholder="at least 4 characters">
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input type="password" id="reset-confirm-pw" autocomplete="new-password"
            placeholder="type it again">
        </div>
        <button type="button" class="btn" id="reset-submit-btn">Reset Password</button>
      </div>
      <div id="reset-error" class="error" style="display:none"></div>
      <div id="reset-success" style="display:none;color:var(--green);font-size:0.84rem;text-align:center;margin-top:1rem"></div>
    </div>

    <div class="hint">Your data is stored privately and never shared.</div>
  </div>
</div>

<script>
  const tabs   = document.querySelectorAll(".tab-btn");
  const panels = document.querySelectorAll(".form-panel");

  function showTab(tabId) {
    const map = { "tab-login-btn": "panel-login", "tab-register-btn": "panel-register", "tab-reset-btn": "panel-reset" };
    tabs.forEach(t => t.classList.toggle("active", t.id === tabId));
    panels.forEach(p => p.classList.toggle("active", p.id === map[tabId]));
  }

  tabs.forEach(t => t.addEventListener("click", () => showTab(t.id)));

  // If the error was on register, show that tab
  {% if error and request.form.get('action') == 'register' %}
  showTab("tab-register-btn");
  {% endif %}

  // ── Reset password flow ──
  let _resetUsername = "";

  document.getElementById("reset-check-btn").addEventListener("click", () => {
    const user = document.getElementById("reset-username").value.trim();
    const errEl = document.getElementById("reset-error");
    errEl.style.display = "none";
    if (!user) { errEl.textContent = "Enter your username."; errEl.style.display = ""; return; }

    fetch("/api/check-username", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.exists) {
        _resetUsername = user;
        document.getElementById("reset-step-1").style.display = "none";
        document.getElementById("reset-step-2").style.display = "";
      } else {
        errEl.textContent = "No account found with that username.";
        errEl.style.display = "";
      }
    })
    .catch(() => {
      errEl.textContent = "Could not reach server. Try again.";
      errEl.style.display = "";
    });
  });

  document.getElementById("reset-submit-btn").addEventListener("click", () => {
    const pw1 = document.getElementById("reset-new-pw").value;
    const pw2 = document.getElementById("reset-confirm-pw").value;
    const errEl = document.getElementById("reset-error");
    const sucEl = document.getElementById("reset-success");
    errEl.style.display = "none";
    sucEl.style.display = "none";

    const rk = document.getElementById("reset-recovery-key").value;
    if (!rk)            { errEl.textContent = "Recovery key is required."; errEl.style.display = ""; return; }
    if (pw1.length < 4) { errEl.textContent = "Password must be at least 4 characters."; errEl.style.display = ""; return; }
    if (pw1 !== pw2)    { errEl.textContent = "Passwords don't match."; errEl.style.display = ""; return; }

    fetch("/api/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: _resetUsername, new_password: pw1, recovery_key: rk }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        document.getElementById("reset-step-2").style.display = "none";
        sucEl.textContent = "Password reset! You can now sign in.";
        sucEl.style.display = "";
        setTimeout(() => showTab("tab-login-btn"), 2000);
      } else {
        errEl.textContent = data.error || "Reset failed.";
        errEl.style.display = "";
      }
    })
    .catch(() => {
      errEl.textContent = "Could not reach server. Try again.";
      errEl.style.display = "";
    });
  });
</script>
</body>
</html>
